<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenderfy — Subbie Portal Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#38988A; --teal-bright:#6ADDB5; --teal-tint:rgba(56,152,138,.15);
    --nav:#27535C; --header:#2E343C;
    --ink:#2E3C3B; --gray:#596262; --light:#A1ADAB; --lighter:#CBD5D3; --bg-shade:#EAEDEC;
    --secondary:#FFBC4A; --accent:#F95246;
    --st-amber-bg:#FFF3E0; --st-amber-tx:#E65100;
    --st-green-bg:#E8F5E9; --st-green-tx:#2E7D32;
    --st-pink-bg:#FCE4EC; --st-pink-tx:#C62828;
    --page:#F9FAFB; --border:#EAEDEC; --row:#F3F4F6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);background:var(--page);font-size:14px;line-height:1.5}
  .ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
  .app{display:flex;min-height:100vh}
  .sidebar{width:64px;background:var(--nav);flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:24px;padding:24px 16px}
  .sidebar .logo{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;font-style:italic;color:var(--secondary)}
  .sidebar .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:18px;border-radius:6px}
  .sidebar .ic:hover{color:var(--teal-bright)}
  .sidebar .ic.active{color:var(--teal-bright)}
  .sidebar .grow{flex:1}
  .sidebar .logout{width:34px;height:34px;border-radius:100px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);font-size:15px}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .header{background:var(--header);color:#fff;display:flex;align-items:center;padding:16px 24px;flex-shrink:0;justify-content:space-between;font-size:14px}
  .header .l{display:flex;align-items:center;gap:8px}
  .header .crumb{color:#cfd6d5}
  .header .crumb b{color:#fff;font-weight:500}
  .header .crumb .cur{color:var(--secondary)}
  .header .r{display:flex;align-items:center;gap:16px;font-weight:500}
  .content{flex:1;overflow:auto}
  .pad{padding:24px}
  .backlink{color:var(--gray);font-size:13px;cursor:pointer}
  .h1{font-size:28px;font-weight:500;margin:2px 0 0}

  /* dashboard */
  .greet-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .greet .date{color:var(--gray);font-size:14px}
  .greet .hi{font-size:32px;font-weight:500;line-height:1.2;display:flex;gap:8px;margin-top:4px}
  .greet .hi .name{color:var(--teal)}
  .stat-pill{display:flex;border:1px solid var(--lighter);border-radius:12px;overflow:hidden}
  .stat-cell{width:140px;padding:12px 20px;display:flex;flex-direction:column;align-items:center;gap:4px;border-right:1px solid var(--lighter)}
  .stat-cell:last-child{border-right:none}
  .stat-cell.active{background:var(--header)}
  .stat-cell .v{font-size:20px;font-weight:500;color:var(--gray)}
  .stat-cell.active .v{color:#fff}
  .stat-cell .l{font-size:12px;color:#6A7282}
  .stat-cell.active .l{color:#D1D5DC}
  .pbanner{background:rgba(234,237,236,.5);border:1px solid var(--lighter);border-radius:8px;padding:17px;display:flex;gap:16px;align-items:center;margin-bottom:24px}
  .pbanner .badge-ic{background:var(--secondary);border-radius:12px;padding:12px;display:flex;color:#fff;font-size:15px}
  .pbanner .txt{flex:1}
  .pbanner .txt p{font-size:13px;color:var(--ink)}
  .pbanner .txt a{color:#45A799;font-weight:600;text-decoration:underline;cursor:pointer}
  .pbar{background:var(--lighter);height:8px;border-radius:12px;overflow:hidden;margin-top:8px}
  .pbar .fill{background:var(--secondary);height:100%;width:60%}
  .tcard{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 16px 16px -8px rgba(12,12,13,.1),0 4px 4px -4px rgba(12,12,13,.05);display:flex;flex-direction:column}
  .tabs{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--lighter);border-bottom:1px solid var(--lighter)}
  .tabs .set{display:flex}
  .tab{display:flex;gap:8px;align-items:center;padding:12px 24px;font-size:14px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:4px solid transparent}
  .tab.active{color:var(--teal);border-bottom-color:var(--teal-bright)}
  .tab .ct{background:var(--bg-shade);color:var(--ink);font-size:12px;font-weight:500;border-radius:4px;padding:2px 6px;min-width:20px;text-align:center}
  .filters{display:flex;gap:9px;align-items:center;padding:0 16px}
  .filters .by{color:var(--light);font-size:12px;font-weight:500}
  .fbtn{background:#fff;border:1px solid var(--border);border-radius:10px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--gray);display:flex;align-items:center;gap:6px;cursor:pointer}
  table.req{width:100%;border-collapse:collapse}
  table.req thead th{background:#F4F4F4;text-align:left;font-size:12px;font-weight:500;color:var(--light);padding:12px 16px}
  table.req tbody td{border-top:1px solid var(--row);padding:14px 16px;font-size:13px;vertical-align:middle}
  table.req td.task,table.req td.tender{color:var(--ink)}
  table.req td.trade,table.req td.due{color:var(--gray)}
  .ccell{display:flex;align-items:center;gap:8px}
  .ava{width:24px;height:24px;border-radius:50%;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .badge{display:inline-flex;font-size:12px;font-weight:500;padding:4px 10px;border-radius:100px;white-space:nowrap}
  .b-opened{background:var(--bg-shade);color:var(--ink)}
  .b-awaiting{background:var(--st-amber-bg);color:var(--st-amber-tx)}
  .b-willrespond{background:var(--st-green-bg);color:var(--st-green-tx)}
  .b-submitted{background:var(--teal-tint);color:var(--teal)}
  .b-declined{background:var(--st-pink-bg);color:var(--st-pink-tx)}
  .acts{display:flex;gap:8px;justify-content:flex-end}
  .split{display:flex;background:var(--teal);border-radius:12px;overflow:hidden}
  .split .lbl{padding:8px 12px;color:#fff;font-size:13px;cursor:pointer}
  .split .caret{padding:8px 10px;border-left:1px solid rgba(255,255,255,.6);color:#fff;display:flex;align-items:center}
  .obtn{border:1px solid var(--light);border-radius:12px;padding:8px 12px;font-size:13px;color:var(--ink);background:#fff;cursor:pointer}
  .tfoot{border-top:1px solid var(--lighter);padding:13px 16px;color:#6A7282;font-size:13px}

  /* generic */
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px}
  h3{font-size:15px;font-weight:600;margin-bottom:14px}
  .sub{color:var(--gray);font-size:13px}
  .row{display:flex;gap:18px;align-items:flex-start}
  .grow{flex:1;min-width:0}
  .rail{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:16px}
  .btn{font-family:inherit;font-size:14px;font-weight:600;padding:11px 18px;border-radius:12px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn-primary{background:var(--teal);color:#fff}
  .btn-primary:hover{background:#2f8276}
  .btn-outline{background:#fff;color:var(--ink);border-color:var(--light)}
  .btn-block{width:100%}
  .btn-danger-outline{background:#fff;color:var(--st-pink-tx);border-color:#eebcbc}
  .link-danger{color:var(--st-pink-tx);font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;text-decoration:underline;padding:6px 0}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* request details table (D1) */
  .rd{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;margin-bottom:18px}
  .rd .rdh{padding:16px 20px;font-weight:600;border-bottom:1px solid var(--row)}
  .rd .rdr{display:flex;padding:11px 20px;border-bottom:1px solid var(--row);font-size:13px}
  .rd .rdr:last-child{border-bottom:none}
  .rd .rk{width:160px;color:var(--gray)}

  .itable{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .itable th{text-align:left;font-weight:500;color:var(--light);font-size:11px;letter-spacing:.4px;padding:8px 10px}
  .itable td{padding:6px 6px}
  .iinput{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .iinput .pfx{padding:8px 9px;color:var(--gray);background:#fafbfb;border-right:1px solid var(--border)}
  .iinput input{border:none;font-family:inherit;font-size:13px;padding:8px 9px;width:100%;text-align:right;outline:none}
  .iname{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px}
  .gst-line{display:flex;justify-content:flex-end;align-items:center;gap:18px;padding:6px 6px;font-size:13px}
  .gst-line .lab{color:var(--gray)}
  .gst-line .val{border:1px solid var(--border);border-radius:8px;padding:7px 12px;min-width:120px;text-align:right}
  .gst-line.total .lab{font-weight:600;color:var(--ink)}
  .gst-line.total .val{font-weight:600;color:var(--teal);border:none}
  .dropzone{border:1.5px dashed var(--lighter);border-radius:10px;padding:34px;text-align:center;color:var(--gray);margin-top:14px}
  .filerow{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-top:10px;font-size:13px}
  .pdftag{background:var(--secondary);color:#fff;font-size:10px;font-weight:700;padding:3px 6px;border-radius:4px}
  .chk{display:flex;align-items:center;gap:7px;font-size:13px}
  .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .seg div{padding:6px 14px;font-size:13px;cursor:pointer;color:var(--gray)}
  .seg div.on{background:var(--bg-shade);color:var(--ink);font-weight:500}

  /* rail summary */
  .rsum .sline{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
  .rsum .div{border-top:1px solid var(--row);margin:10px 0}
  .rsum .total{font-weight:600;font-size:16px}
  .rsum .total .v{color:var(--teal)}
  .msgcard .bubble{background:var(--header);color:#fff;padding:10px 12px;border-radius:10px;font-size:12px;margin:8px 0;line-height:1.5}
  .msgcard .me{background:#1f262d}
  .msgInput{display:flex;gap:8px;margin-top:10px}
  .msgInput input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px}

  /* auth */
  .auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(120deg,#7DBE6E 0%,#2E8C86 42%,#1E3A8A 100%);padding:40px}
  .auth-card{background:#fff;border-radius:14px;width:360px;padding:34px 30px 0;display:flex;flex-direction:column;min-height:480px}
  .wordmark{font-size:24px;font-weight:700;color:var(--teal);margin-bottom:26px}
  .wordmark .e{color:var(--secondary);font-style:italic}
  .auth-card h2{font-size:20px;font-weight:600;margin-bottom:6px}
  .auth-foot{margin-top:auto;text-align:center;padding:18px 0 0;font-size:12px}
  .auth-foot a{color:var(--teal);text-decoration:underline}
  .auth-strip{background:var(--bg-shade);margin:14px -30px 0;padding:12px;text-align:center;font-size:12px;color:var(--gray);border-radius:0 0 14px 14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:#fafbfb}
  .field .hint{color:var(--light);font-size:12px;margin-top:6px}
  .field .err{color:var(--st-pink-tx);font-size:12px;margin-top:5px;display:none}
  .field.invalid input{border-color:var(--st-pink-tx)}
  .field.invalid .err{display:block}
  .banner{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .banner.amber{background:var(--st-amber-bg);color:var(--st-amber-tx)}
  .banner.pink{background:var(--st-pink-bg);color:var(--st-pink-tx)}

  /* file manager */
  .fm-head{display:flex;justify-content:space-between;align-items:flex-start}
  .ftabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:18px 0}
  .ftab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent}
  .ftab.on{color:var(--teal);border-bottom-color:var(--teal-bright)}
  .fsort{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;margin-bottom:16px}
  .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
  .fdoc{border:1px solid var(--border);border-radius:10px;padding:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .fdoc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .doctag{background:#185FA5;color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px}
  .fdoc .thumb{height:120px;border:1px solid var(--row);border-radius:6px;background:#fcfcfc;padding:10px;font-size:8px;color:#bbb;overflow:hidden;line-height:1.4}
  .fdoc .ti{font-weight:500;font-size:13px;margin-top:10px}
  .fdoc .by{color:var(--light);font-size:12px;margin-top:2px}

  /* settings */
  .settings-wrap{max-width:640px;margin:0 auto}
  .set-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px}
  .set-sec{padding:14px 0;border-bottom:1px solid var(--row)}
  .set-sec:last-child{border-bottom:none}
  .set-sec h4{font-size:14px;font-weight:600;margin-bottom:10px}
  .set-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:var(--gray)}
  .toggle{width:34px;height:18px;border-radius:99px;background:var(--lighter);position:relative;cursor:pointer}
  .toggle.on{background:var(--teal)}
  .toggle .k{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.15s}
  .toggle.on .k{left:18px}
  .about-row{display:flex;gap:60px;font-size:13px;color:var(--gray);padding:8px 0}

  /* profile */
  .prof-head{display:flex;gap:16px;align-items:center;margin-bottom:18px}
  .prof-ava{width:64px;height:64px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600}
  .kvrow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--row);font-size:13px}
  .kvrow .k{color:var(--gray)}
  .kvrow .v{font-weight:500}

  .empty{text-align:center;padding:70px 20px;color:var(--gray)}
  .empty .ic{font-size:40px;opacity:.35;margin-bottom:14px}
  .empty h2{color:var(--ink);font-size:18px}

  /* modal (quote summary) */
  .modal-overlay{position:fixed;inset:0;background:rgba(39,83,92,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:24px}
  .modal-overlay.open{display:flex}
  .qmodal{background:#fff;border-radius:14px;max-width:1180px;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .qmbody{display:flex;gap:0;overflow:auto;flex:1}
  .qcol{padding:24px;overflow:auto}
  .qcol.edit{width:320px;flex-shrink:0;border-right:1px solid var(--border)}
  .qcol.preview{flex:1;background:#f4f5f5}
  .qcol.bd{width:300px;flex-shrink:0;border-left:1px solid var(--border)}
  .qmodal h2{font-size:18px;font-weight:600;margin-bottom:4px}
  .docpaper{background:#fff;border:1px solid var(--border);border-radius:6px;padding:22px;font-size:10px;color:#444}
  .docpaper h4{font-size:14px;font-weight:700}
  .qmfoot{display:flex;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--border)}
  .bd .sline{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
  .bd .total{font-weight:600;font-size:15px}
  .bd .total .v{color:var(--teal)}

  .state-toggle{position:fixed;bottom:22px;right:22px;background:var(--nav);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .state-toggle .title{color:var(--lighter);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .state-toggle .opts{display:flex;gap:6px}
  .state-toggle button{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid #3a6670;background:transparent;color:#fff;cursor:pointer}
  .state-toggle button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .state-toggle button:disabled{opacity:.3;cursor:not-allowed}
  .chrome-hidden .sidebar,.chrome-hidden .header{display:none}

  /* C1 View Request */
  .vr-title{font-size:28px;font-weight:500;margin:2px 0 18px}
  .ctabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:22px}
  .ctab{padding:12px 4px;margin-right:28px;font-size:15px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent}
  .ctab.on{color:var(--teal);border-bottom-color:var(--teal)}
  .vr-sec-h{font-size:16px;font-weight:600;margin:24px 0 14px}
  .vr-detail{font-size:14px}
  .vr-detail .r{display:flex;padding:13px 0;border-bottom:1px solid var(--row)}
  .vr-detail .r:last-child{border-bottom:none}
  .vr-detail .k{width:160px;color:var(--gray)}
  .vr-desc{line-height:1.9;color:var(--ink)}
  .timeline{position:relative;padding-left:22px}
  .timeline:before{content:"";position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--lighter)}
  .tnote{position:relative;background:#F4F5F4;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .tnote:before{content:"";position:absolute;left:-22px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--lighter);border:2px solid #fff}
  .tnote.new:before{background:var(--teal)}
  .tnote .who{font-size:13px;font-weight:600}
  .tnote .when{font-size:12px;color:var(--light);margin-left:8px;font-weight:400}
  .tnote .body{font-size:13px;color:var(--gray);margin-top:6px}

  /* response card (dark) */
  .resp-card{background:var(--header);border-radius:14px;padding:22px}
  .resp-card h3{color:#fff;font-size:16px;margin-bottom:4px}
  .resp-card .lead{color:#b7c0c4;font-size:12px;margin-bottom:14px}
  .resp-card .sec2{color:#fff;font-size:16px;font-weight:600;margin:20px 0 4px}
  .resp-btn-primary{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px}
  .resp-btn-white{width:100%;background:#fff;color:var(--ink);border:none;border-radius:10px;padding:12px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:10px;display:flex;justify-content:center;align-items:center;position:relative}
  .resp-btn-white .car{position:absolute;right:14px;color:var(--gray)}

  /* messages card */
  .msg-card{background:#fff;border:1px solid var(--teal-bright);border-radius:14px;padding:0;overflow:hidden}
  .msg-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--row)}
  .msg-head .ttl{font-weight:600;font-size:14px;flex:1}
  .msg-unread{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px}
  .msg-body{padding:14px 16px;max-height:300px;overflow:auto}
  .msg-from{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray);margin:10px 0 6px}
  .msg-from .ava{width:22px;height:22px;font-size:9px}
  .bub{padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.5;max-width:88%}
  .bub.them{background:#EDEFEE;color:var(--ink);border-radius:10px 10px 10px 2px}

<body>

<script>
let current='dashboard', state='filled';
const crumbs={

  confirm:'Quote submitted', withdraw:'Withdraw quote',
  files:'File Manager', profile:'Profile', settings:'Settings'};
const supports={dashboard:['filled','empty'],request:['filled'],quote:['filled','error'],confirm:['filled'],files:['filled','empty'],profile:['filled','empty'],settings:['filled'],landing:['filled'],auth:['filled','error'],withdraw:['filled']};
const noChrome=['landing','auth'];

function go(s){ current=s; const sup=supports[s]||['filled']; state=sup.includes('filled')?'filled':sup[0];
  document.querySelectorAll('.sidebar .ic').forEach(n=>n.classList.toggle('active',n.dataset.nav===s));
  render(); }
function setState(st){ if((supports[current]||[]).includes(st)){ state=st; render(); } }

function render(){
  document.getElementById('appShell').classList.toggle('chrome-hidden',noChrome.includes(current));
  document.getElementById('crumb').innerHTML=crumbs[current]||'Tenderfy';
  document.querySelectorAll('.state-toggle button').forEach(b=>{ const ok=(supports[current]||['filled']).includes(b.dataset.st); b.disabled=!ok; b.classList.toggle('on',ok&&b.dataset.st===state); });
  document.getElementById('screen').innerHTML=(screens[current]||screens.shell)();
}

const avaColor={TC:'#38988A',HP:'#5C6BC0',AC:'#EF6C00',BQ:'#6D4C41',MS:'#00838F'};
const rows=[
  ['TC','Tenderfy Civil','Traffic Management','Traffic Management','Velocity Link Hwy Extension','20 May 2026','Opened','b-opened','submit'],

  ['HP','Hansen Projects','Solar panel install','Electrical','City Library Renewal','5 Jun 2026','Quote submitted','b-submitted','wv'],
  ['BQ','Buildcorp QLD','Structural steel','Civil','River Crossing Bridge','10 Jun 2026','Quote submitted','b-submitted','wv'],
  ['MS','McMahon Services','Earthworks & bulk cut','Civil','Velocity Link Hwy Extension','12 Jun 2026','Quote submitted','b-submitted','wv'],
  ['MS','McMahon Services','Drainage installation','Civil','Industrial Estate Stage 3','15 Jun 2026','Quote submitted','b-submitted','wv'],
  ['AC','Acme Constructions','HVAC commissioning','Mechanical','Northside School Upgrade','8 Jun 2026','Declined','b-declined','submit'],

const screens={

/* helpers */
function tab(l,c,on){ return `<div class="tab ${on?'active':''}">${l}<span class="ct">${c}</span></div>`; }
function fbtn(l){ return `<div class="fbtn">${l} <span class="ms" style="font-size:16px">arrow_drop_down</span></div>`; }
function ft(n,on){ return `<div class="ftab ${on?'on':''}">${n}</div>`; }
function setRow(l,on){ return `<div class="set-row"><span>${l}</span><div class="toggle ${on?'on':''}" onclick="this.classList.toggle('on')"><div class="k"></div></div></div>`; }
function requestDetails(status,badge){
  const r=(k,v)=>`<div class="rdr"><span class="rk">${k}</span><span>${v}</span></div>`;
  return `<div class="rd"><div class="rdh">Request details</div>
    <div class="rdr"><span class="rk">Status</span><span class="badge ${badge}">${status}</span></div>
    ${r('Tender name','Velocity Link Highway Extension')}${r('Tender number','TMRICT22076')}${r('Organisation','Dept of Transport & Main Roads')}${r('Sector','Traffic Management')}${r('Contractor','Tenderfy Civil')}</div>`;
}
function iRow(cat,amt,err){ return `<tr><td><div class="iname" style="background:#fafbfb">${cat}</div></td><td><div class="iinput" style="${err?'border-color:var(--st-pink-tx)':''}"><span class="pfx">$</span><input value="${amt}" data-amt oninput="recalc()"></div></td></tr>`; }
function fileRow(name,rm){ return `<div class="filerow"><span class="pdftag">PDF</span><span class="grow">${name}</span>${rm?'<span class="sub" style="cursor:pointer">View &nbsp; <span style="color:var(--accent)"><span class="ms" style="font-size:14px">close</span> Remove</span></span>':'<span class="sub"><span class="ms" style="font-size:18px">download</span></span>'}</div>`; }
function authCard(h,p,cta,err){
  return `<div class="auth-bg"><div class="auth-card">
    <div class="wordmark">tend<span class="e">l</span>rfy</div>
    <h2>${h}</h2><p class="sub" style="margin-bottom:20px">${p}</p>

    <div class="field"><label>Email address</label><input value="sub-contractor@email.com"><div class="hint">This is the email your quote request was sent to. It will be your login.</div></div>
    <button class="btn btn-primary btn-block" onclick="go('dashboard')">${cta}</button>

    <div class="auth-strip">Your portal is secure. Only you can access requests sent to your email.</div>
  </div></div>`;
}
function recalc(){ let tot=0; document.querySelectorAll('[data-amt]').forEach(i=>{ tot+=Number(String(i.value).replace(/[^0-9.]/g,''))||0; });
  const sub=tot/1.1,gst=tot-sub,f=n=>'$'+n.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
  ['sub','r-sub'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=f(sub);});
  ['gst','r-gst'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=f(gst);});
  ['tot','r-tot'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=f(tot);}); }
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
